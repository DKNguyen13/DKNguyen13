name: Generate Pacman Contribution Graph

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Generate Pacman contribution graph
        uses: abozanona/pacman-contribution-graph@v5.0.0
        with:
          github_user_name: DKNguyen13
          games: pacman

      - name: Push SVG files to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
